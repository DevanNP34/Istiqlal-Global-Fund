<!DOCTYPE html>
<html lang="id">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="author" content="IGF">
    <meta name="description" content="IGF">
    <meta name="keywords" content="Istiqlal Global Fund, IGF, Global Fund, Bisnis Istiqlal, Masjid, Masjid Istiqlal, Istiqlal, Masjid Terbesar di Asia, Simbol Islam Indonesia, Moderasi Islam, layanan">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website"/>

    <title>Istiqlal Global Fund</title>

    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/custom.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>
    <div class="navbar-top-bg"></div>

    <!-- HERO -->
    <section class="page-header section-blue py-5">
        <div class="container text-center">
            <h1 class="fw-bold gold-font">Kegiatan Kerjasama</h1>
            <p>Program dan kegiatan Istiqlal Global Fund</p>
        </div>
    </section>

    <!-- EVENTS GRID -->
    <section class="py-5 section-light">
        <div class="container">

            <div class="row g-4" id="events-container" data-type="KS"></div>

        </div>
    </section>

    <!-- Event Modal -->
    <div id="eventModal" class="event-modal">
        <div class="event-modal-content">

            <button class="event-close"><i class="bi bi-x-lg"></i></button>

            <div class="modal-gallery">
                <button class="gallery-prev">
                    <i class="bi bi-chevron-left"></i>
                </button>

                <img id="modal-photo">

                <button class="gallery-next">
                    <i class="bi bi-chevron-right"></i>
                </button>

                <div class="gallery-counter">
                    <span id="gallery-current">1</span> / 
                    <span id="gallery-total">1</span>
                </div>

            </div>

            <h3 id="modal-event"></h3>
            <p id="modal-description"></p>

        </div>
    </div>

    <!-- FOOTER -->
    <div id="footer"></div>
      

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/kegiatan.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>

</body>
</html>
